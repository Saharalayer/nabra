<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Nabra Cosmetiques</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- خط حديث -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- أيقونات رسمية -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0d1b3d, #1c2a4d);
      color: #fff;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 40px 20px;
    }
    header img {
      width: 160px;
      margin-bottom: 15px;
    }
    header h1 {
      color: #d4af37;
      margin: 0;
      font-size: 2.2em;
      letter-spacing: 2px;
    }
    header p {
      margin-top: 10px;
      font-size: 1.2em;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 30px;
      font-size: 1.8em;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }
    .product {
      background: #fff;
      color: #333;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.25);
    }
    .product img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
    }
    .product h3 {
      color: #0d1b3d;
      margin: 12px 0;
      font-weight: 600;
    }
    .price {
      color: #d4af37;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1.1em;
    }
    button {
      background: #d4af37;
      color: #0d1b3d;
      font-weight: bold;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #b7950b;
    }
    footer {
      background: #0d1b3d;
      text-align: center;
      padding: 30px 15px;
      margin-top: 50px;
    }
    footer p {
      margin-bottom: 15px;
      font-size: 1.1em;
      color: #fff;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .social-links a {
      color: #d4af37;
      font-size: 1.5em;
      transition: color 0.3s ease;
    }
    .social-links a:hover {
      color: #fff;
    }
    @media (max-width: 600px) {
      header h1 { font-size: 1.6em; }
      h2 { font-size: 1.4em; }
      .product img { height: 180px; }
    }
  </style>
</head>
<body>
  <!-- رأس الصفحة -->
  <header>
    <img src="logo.png" alt="Nabra Cosmetiques Logo">
    <h1>Nabra Cosmetiques</h1>
    <p>جمال طبيعي بلمسة فاخرة ✨</p>
  </header>

  <!-- المنتجات -->
  <div class="container">
    <h2>منتجاتنا</h2>
    <div class="products">
      <div class="product">
        <img src="product1.jpg" alt="منتج 1">
        <h3>منتج 1</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">150 درهم</p>
        <button onclick="sendOrder('منتج 1', '150')">اطلب الآن</button>
      </div>
      <div class="product">
        <img src="product2.jpg" alt="منتج 2">
        <h3>منتج 2</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">170 درهم</p>
        <button onclick="sendOrder('منتج 2', '170')">اطلب الآن</button>
      </div>
      <div class="product">
        <img src="product3.jpg" alt="منتج 3">
        <h3>منتج 3</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">190 درهم</p>
        <button onclick="sendOrder('منتج 3', '190')">اطلب الآن</button>
      </div>
      <div class="product">
        <img src="product4.jpg" alt="منتج 4">
        <h3>منتج 4</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">200 درهم</p>
        <button onclick="sendOrder('منتج 4', '200')">اطلب الآن</button>
      </div>
      <div class="product">
        <img src="product5.jpg" alt="منتج 5">
        <h3>منتج 5</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">220 درهم</p>
        <button onclick="sendOrder('منتج 5', '220')">اطلب الآن</button>
      </div>
      <div class="product">
        <img src="product6.jpg" alt="منتج 6">
        <h3>منتج 6</h3>
        <p>وصف قصير للمنتج</p>
        <p class="price">230 درهم</p>
        <button onclick="sendOrder('منتج 6', '230')">اطلب الآن</button>
      </div>
    </div>
  </div>

  <!-- الفوتر -->
  <footer>
    <p>تابعونا على وسائل التواصل:</p>
    <div class="social-links">
      <a href="https://www.snapchat.com/add/Nabra_Cosmetiques"><i class="fab fa-snapchat"></i></a>
      <a href="https://www.instagram.com/Nabra_Cosmetiques"><i class="fab fa-instagram"></i></a>
      <a href="https://www.facebook.com/Nabra_Cosmetiques"><i class="fab fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@Nabra_Cosmetiques"><i class="fab fa-tiktok"></i></a>
    </div>
  </footer>

  <script>
    function sendOrder(product, price) {
      const message = `مرحباً، أرغب في طلب ${product} بسعر ${price} درهم.`;
      const url = `https://wa.me/212635633060?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
