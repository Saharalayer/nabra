<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Nabra Cosmetiques</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0d1b3d, #1c2a4d); /* الأزرق الداكن من الشعار */
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }
    .logo {
      width: 150px;
      margin-bottom: 20px;
    }
    h2 {
      color: #d4af37; /* الذهبي من الشعار */
    }
    form {
      background: #fff;
      color: #333;
      padding: 20px;
      border-radius: 12px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #d4af37;
      color: #0d1b3d;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #b7950b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Nabra Cosmetiques Logo" class="logo">
    <h2>اطلب منتجاتك الآن</h2>
    <form id="orderForm">
      <input type="text" id="name" placeholder="الاسم الكامل" required>
      <input type="text" id="phone" placeholder="رقم الهاتف" required>
      <input type="text" id="address" placeholder="العنوان" required>
      <select id="product">
        <option value="كريم تفتيح">كريم تفتيح</option>
        <option value="زيت طبيعي">زيت طبيعي</option>
        <option value="ماسك">ماسك</option>
      </select>
      <button type="button" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
    </form>
  </div>

  <script>
    function sendOrder() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const product = document.getElementById('product').value;

      const message = `مرحباً، اسمي ${name}.\nرقمي: ${phone}\nالعنوان: ${address}\nأرغب في طلب: ${product}`;
      const url = `https://wa.me/212635633060?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
